rubrics:
  - importance: REQUIRED
    type: DATA_HANDLING
    criterion: Uses the image files referenced by image_path and does not train on or infer from private answer labels.
    rationale: The task is an image classification challenge, and private labels are reserved for grading.

  - importance: REQUIRED
    type: DATA_HANDLING
    criterion: Produces exactly one valid degradation_label prediction for every sample_id in test.csv with no duplicate or missing IDs.
    rationale: The grader requires a complete one-to-one match to private test rows.

  - importance: REQUIRED
    type: TRAINING
    criterion: Uses a validation strategy on the labeled training data that reports per-class performance, not only overall accuracy.
    rationale: The score rewards balanced class behavior and hidden difficult groups, so solvers need feedback beyond aggregate training accuracy.

  - importance: REQUIRED
    type: MODELING
    criterion: Does not use external image datasets, pretrained models, internet access, or post-generation diagnostic leakage columns.
    rationale: The challenge should be solved from the provided synthetic images and public metadata only.

  - importance: RECOMMENDED
    type: FEATURE_ENGINEERING
    criterion: Extracts image features related to edge fuzziness, dark-pixel continuity, halo color, pale speckles, and local contrast.
    rationale: These visual cues distinguish feathering, bleed-through, abrasion, salt bloom, and stable ink.

  - importance: RECOMMENDED
    type: MODELING
    criterion: Handles class balance and hard visual variants explicitly, such as by using augmentation, stratified validation, per-class metrics, or balanced decision thresholds.
    rationale: The robust macro F1 metric penalizes models that only solve easy examples or common visual patterns.

  - importance: RECOMMENDED
    type: MODELING
    criterion: Uses image augmentation or feature extraction that is robust to low contrast, foxing, scanner jitter, faint artifacts, and mixed secondary artifacts.
    rationale: The private test set contains more medium and hard cases than a random split, so brittle easy-case heuristics will not generalize.

  - importance: RECOMMENDED
    type: FEATURE_ENGINEERING
    criterion: Uses metadata such as parchment_tone, ink_family, stroke_width_px, and scan_gain to normalize or contextualize image features.
    rationale: Paper tone and scan gain change apparent color and contrast, which can confuse purely raw-pixel heuristics.

  - importance: RECOMMENDED
    type: CODE_QUALITY
    criterion: Reads inputs from /dataset/public with relative image paths and writes only /working/submission.csv.
    rationale: Submissions must run reproducibly in the Kaggle-style environment.

  - importance: UNIVERSAL
    type: COMMUNICATION
    criterion: Explains which visual patterns or features were used to separate the five degradation classes.
    rationale: The task is meant to evaluate image reasoning, not only final labels.
